<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude Token Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:    #0d0d0d;
  --surf:  #161616;
  --surf2: #1e1e1e;
  --bdr:   #2a2a2a;
  --bdr2:  #333;
  --acc:   #e8ff47;
  --acc2:  #ff6b35;
  --acc3:  #47d4ff;
  --acc4:  #c47aff;
  --txt:   #e8e8e8;
  --mut:   #666;
  --mut2:  #444;
  --red:   #ff4747;
  --green: #47ff8a;
  --yel:   #ffcc00;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--bdr);background:var(--surf);position:sticky;top:0;z-index:100}
.logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--acc);letter-spacing:.05em}
.logo span{color:var(--mut);font-weight:400}
.hdr-r{display:flex;align-items:center;gap:14px}.rbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:5px 13px;background:transparent;border:1px solid var(--bdr2);color:var(--mut);border-radius:2px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s}
.rbtn:hover{border-color:var(--acc);color:var(--acc)}
.rbtn.active{border-color:var(--acc2);color:var(--acc2);background:rgba(74,222,128,.08)}

.shell{display:grid;grid-template-columns:196px 1fr;min-height:calc(100vh - 49px)}

.sbar{background:var(--surf);border-right:1px solid var(--bdr);padding:18px 0;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto}
.nav-sec{padding:0 12px;margin-bottom:18px}
.nav-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--mut2);margin-bottom:5px;padding-left:4px}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:2px;cursor:pointer;font-size:12px;color:var(--mut);border:1px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--surf2);color:var(--txt)}
.nav-item.on{background:#1a1a0d;color:var(--acc);border-color:#2a2a00}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--mut2);flex-shrink:0}
.nav-item.on .ndot{background:var(--acc)}
.ntag{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:1px;margin-left:auto}
.tw{background:rgba(255,107,53,.12);color:var(--acc2)}
.tn{background:rgba(232,255,71,.12);color:var(--acc)}
.tb{background:rgba(71,212,255,.12);color:var(--acc3)}
.tp{background:rgba(196,122,255,.12);color:var(--acc4)}

.content{padding:22px 26px;overflow-y:auto}
.panel{display:none}.panel.on{display:block}

.pg-hdr{margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.pg-title{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--txt);margin-bottom:3px}
.pg-sub{font-size:11px;color:var(--mut)}

.kpi-row{display:grid;gap:10px;margin-bottom:14px}
.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:2px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ky::before{background:var(--acc)}.ko::before{background:var(--acc2)}.kb::before{background:var(--acc3)}.kp::before{background:var(--acc4)}.kg::before{background:var(--green)}.kr::before{background:var(--red)}
.kpi-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:5px}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:var(--txt);line-height:1}
.kpi-sub{font-size:10px;color:var(--mut);margin-top:3px}

.card{background:var(--surf);border:1px solid var(--bdr);border-radius:2px;padding:15px 17px;margin-bottom:12px}
.card-ttl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.bar-chart{display:flex;flex-direction:column;gap:7px}
.bar-row{display:grid;gap:8px;align-items:center;font-size:11px}
.br3{grid-template-columns:120px 1fr 65px}.br4{grid-template-columns:120px 1fr 65px 60px}
.blbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrk{height:6px;background:var(--surf2);border-radius:1px;overflow:hidden}
.bfil{height:100%;border-radius:1px;transition:width .5s}
.bval{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt);text-align:right}
.bval2{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);text-align:right}

.trend-wrap{position:relative;margin-bottom:6px;overflow-x:auto}
.trend-c{width:100%;display:block}

.pcmp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.pcmp{background:var(--surf2);border:1px solid var(--bdr);border-radius:2px;padding:10px 12px}
.pcmp-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:5px}
.pcmp-row{display:flex;align-items:baseline;gap:7px}
.pcmp-cur{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--txt)}
.pcmp-prev{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut)}
.pcmp-d{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;margin-top:3px}

.habit{background:var(--surf2);border:1px solid var(--bdr);border-radius:2px;padding:11px 13px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;border-left:3px solid var(--mut2);margin-bottom:7px}
.habit.crit{border-left-color:var(--red)}.habit.warn{border-left-color:var(--yel)}.habit.info{border-left-color:var(--acc3)}
.htt{font-weight:600;font-size:12px;color:var(--txt);margin-bottom:3px}
.hds{font-size:11px;color:var(--mut);line-height:1.55}
.hbdg{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:1px;white-space:nowrap}
.hexp{font-size:10px;color:var(--mut2);margin-top:5px;line-height:1.4}
.habit-chart{width:100%;display:block;margin-top:8px}
.habit-chart-empty{font-size:10px;color:var(--mut2);margin-top:8px;font-style:italic}
.habit-filter-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.habit-filter-row label{font-size:10px;color:var(--mut)}
.habit-filter-row select{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-size:10px;padding:2px 6px;border-radius:2px;cursor:pointer}
.bdr-r{background:rgba(255,71,71,.12);color:var(--red)}.bdr-y{background:rgba(255,204,0,.12);color:var(--yel)}
.bdr-b{background:rgba(71,212,255,.12);color:var(--acc3)}.bdr-g{background:rgba(71,255,138,.12);color:var(--green)}

/* Insights panel */
.insight{background:var(--surf2);border:1px solid var(--bdr);border-radius:2px;padding:13px 15px;margin-bottom:8px;border-left:3px solid var(--mut2)}
.insight.warning{border-left-color:var(--yel)}
.insight.info{border-left-color:var(--acc3)}
.insight.neutral{border-left-color:var(--mut)}
.insight-title{font-weight:600;font-size:12px;color:var(--txt);margin-bottom:4px}
.insight-desc{font-size:11px;color:var(--mut);line-height:1.6;margin-bottom:6px}
.insight-action{font-size:11px;color:var(--green);font-style:italic}
.insight-type{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;padding:2px 6px;border-radius:1px;float:right;margin-left:8px}
.it-w{background:rgba(255,204,0,.12);color:var(--yel)}
.it-i{background:rgba(71,212,255,.12);color:var(--acc3)}
.it-n{background:rgba(102,102,102,.2);color:var(--mut)}

.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);text-align:left;padding:6px 9px;border-bottom:1px solid var(--bdr)}
.tbl td{padding:6px 9px;border-bottom:1px solid var(--bdr);font-family:'IBM Plex Mono',monospace}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surf2)}
.tbl tr.clickable{cursor:pointer}
.tc{color:var(--acc2)}.cc{color:var(--green)}.c3{color:var(--acc3)}

.donut-wrap{position:relative;width:152px;height:152px;flex-shrink:0}
.donut-wrap canvas{width:152px;height:152px}
.donut-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-main{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;line-height:1}
.donut-sub{font-size:9px;color:var(--mut);margin-top:2px}
.donut-row{display:flex;gap:16px;align-items:center}
.leg{display:flex;flex-direction:column;gap:7px}
.leg-i{display:flex;align-items:center;gap:7px;font-size:11px}
.leg-d{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.leg-n{color:var(--txt);flex:1}
.leg-v{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut)}

.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tip{background:var(--surf2);border:1px solid var(--bdr);border-radius:2px;padding:12px 13px;border-top:2px solid var(--acc)}
.tip.o{border-top-color:var(--acc2)}.tip.b{border-top-color:var(--acc3)}.tip.p{border-top-color:var(--acc4)}
.tip-n{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:5px}
.tip-t{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:4px}
.tip-b{font-size:11px;color:var(--mut);line-height:1.6}
.tip-s{margin-top:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--green);font-weight:600}

.tool-row{display:grid;grid-template-columns:110px 1fr 55px 60px;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr)}
.tool-row:last-child{border-bottom:none}
.tnm{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc3)}
.tct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt);text-align:right}
.tpc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);text-align:right}

/* Top Prompts */
.prompt-row{padding:10px 0;border-bottom:1px solid var(--bdr)}
.prompt-row:last-child{border-bottom:none}
.prompt-rank{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);margin-bottom:4px}
.prompt-text{font-size:12px;color:var(--txt);margin-bottom:6px;line-height:1.5;word-break:break-word}
.prompt-bars{display:grid;grid-template-columns:80px 1fr 70px;gap:6px;align-items:center;margin-bottom:3px;font-size:10px}
.prompt-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut)}
.prompt-cost{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc2);font-weight:600}
.prompt-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut)}

/* Session drill-down modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.on{display:flex}
.modal{background:var(--surf);border:1px solid var(--bdr2);border-radius:3px;width:min(820px,95vw);max-height:88vh;overflow-y:auto;padding:22px 24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.modal-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--txt)}
.modal-sub{font-size:10px;color:var(--mut);margin-top:3px}
.close-btn{background:none;border:1px solid var(--bdr2);color:var(--mut);cursor:pointer;font-size:14px;padding:3px 10px;border-radius:2px;font-family:'IBM Plex Mono',monospace}
.close-btn:hover{color:var(--txt);border-color:var(--txt)}
.turn-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;margin-top:8px}
.turn-row{display:grid;grid-template-columns:28px 1fr 70px 55px 40px;gap:8px;align-items:center;padding:4px 6px;border-radius:2px;font-size:10px}
.turn-row:hover{background:var(--surf2)}
.turn-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);text-align:right}
.turn-prompt{font-size:10px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.turn-prompt.has-p{color:var(--acc3)}
.turn-cost{font-family:'IBM Plex Mono',monospace;font-size:10px;text-align:right}
.turn-model{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--mut);text-align:right}
.turn-tools{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut2);text-align:right}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--mut);font-family:'IBM Plex Mono',monospace;font-size:12px}
.spin{width:12px;height:12px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:rgba(255,71,71,.07);border:1px solid rgba(255,71,71,.3);border-radius:2px;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);margin:16px 0;line-height:1.7}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

.up{color:var(--red)}.dn{color:var(--green)}.fl{color:var(--mut)}

/* Session filter bar */
.sess-filter-bar{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.filter-input{font-family:'IBM Plex Mono',monospace;font-size:10px;background:transparent;border:1px solid var(--bdr2);color:var(--txt);border-radius:2px;padding:5px 8px;cursor:pointer;outline:none;color-scheme:dark}
.filter-input:focus{border-color:var(--acc)}
.sess-clear-btn{display:none}
.proj-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:var(--surf);border:1px solid var(--bdr2);border-radius:2px;padding:8px 0;min-width:180px;max-height:240px;overflow-y:auto}
.proj-dropdown.open{display:block}
.proj-check-lbl{display:flex;align-items:center;gap:7px;padding:5px 12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);transition:background .1s}
.proj-check-lbl:hover{background:var(--surf2);color:var(--txt)}
.proj-check{accent-color:var(--acc);cursor:pointer}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">claude<span>/</span>token-analyzer</div>
  <div class="hdr-r">
    <button class="rbtn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<!-- Drill-down overlay -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="shell">
  <nav class="sbar">
    <div class="nav-sec">
      <div class="nav-lbl">Overview</div>
      <div class="nav-item on" data-p="projects"><div class="ndot"></div>By Project</div>
      <div class="nav-item" data-p="daily"><div class="ndot"></div>Token Usage</div>
      <div class="nav-item" data-p="cost"><div class="ndot"></div>Cost</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Analysis</div>
      <div class="nav-item" data-p="sessions"><div class="ndot"></div>Sessions</div>
      <div class="nav-item" data-p="topPrompts"><div class="ndot"></div>Top Prompts</div>
      <div class="nav-item" data-p="habits"><div class="ndot"></div>Bad Habits</div>
      <div class="nav-item" data-p="insights"><div class="ndot"></div>Insights</div>
      <div class="nav-item" data-p="tools"><div class="ndot"></div>Tool Usage</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Action</div>
      <div class="nav-item" data-p="tips"><div class="ndot"></div>Tips</div>
    </div>
  </nav>

  <main class="content" id="content">
    <div class="loading"><div class="spin"></div>Loading…</div>
  </main>
</div>

<script>
let D = null;
let activePanel = 'projects';
let habitWeeks = 3;
let toolWeeks = 3;
let topPromptDateStart = '';
let topPromptDateEnd = '';

const $  = id => document.getElementById(id);
const qs = s  => document.querySelector(s);

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toString();
}
function fmtC(c) {
  if (c == null || isNaN(c)) return '—';
  if (c >= 1)    return '$'+c.toFixed(2);
  if (c >= 0.01) return '$'+c.toFixed(3);
  return '$'+c.toFixed(4);
}
function fmtD(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtDFull(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function modelLabel(m) {
  if (!m) return '?';
  const ml = m.toLowerCase();
  if (ml.includes('opus'))   return 'Opus';
  if (ml.includes('sonnet')) return 'Sonnet';
  if (ml.includes('haiku'))  return 'Haiku';
  return m.split('-').slice(-2).join('-');
}
function modelColor(m) {
  if (!m) return '#666';
  const ml = m.toLowerCase();
  if (ml.includes('opus'))   return '#ff6b35';
  if (ml.includes('sonnet')) return '#e8ff47';
  if (ml.includes('haiku'))  return '#47ff8a';
  return '#47d4ff';
}

// ── overlay ────────────────────────────────────────────────────────────────
function closeOverlay() {
  $('overlay').classList.remove('on');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

// ── fetch ──────────────────────────────────────────────────────────────────
async function loadData() {
  $('content').innerHTML = '<div class="loading"><div class="spin"></div>Reading ~/.claude/projects/…</div>';
  try {
    const r = await fetch('/api/data');
    if (!r.ok) throw new Error('Server returned '+r.status);
    D = await r.json();
    renderAll();
  } catch(e) {
    $('content').innerHTML = `<div class="err-box">
      Could not reach the server.<br><br>
      Make sure it is running:<br>
      &nbsp;&nbsp;node server.js<br><br>
      Error: ${e.message}
    </div>`;
  }
}

// ── render everything ──────────────────────────────────────────────────────
function renderAll() {
  const t = D.totals;
  const total = t.input + t.output + t.cache_write + t.cache_read;
  $('content').innerHTML = `
    <div class="panel on"  id="panel-projects"></div>
    <div class="panel"     id="panel-daily"></div>
    <div class="panel"     id="panel-cost"></div>
    <div class="panel"     id="panel-insights"></div>
    <div class="panel"     id="panel-habits"></div>
    <div class="panel"     id="panel-tools"></div>
    <div class="panel"     id="panel-topPrompts"></div>
    <div class="panel"     id="panel-sessions"></div>
    <div class="panel"     id="panel-tips"></div>
  `;

  buildDaily();
  buildProjects();
  buildCost();
  buildInsights();
  buildHabits();
  buildTools();
  buildTopPrompts();
  buildSessions();
  buildTips();

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('on', el.dataset.p === activePanel);
    el.onclick = () => {
      activePanel = el.dataset.p;
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('on'));
      el.classList.add('on');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
      const pnl = $('panel-'+el.dataset.p);
      if (pnl) pnl.classList.add('on');
      if (el.dataset.p === 'daily')  { setTimeout(drawDailyChart, 40); setTimeout(drawWeeklyTokenChart, 40); setTimeout(drawDualLineDaily, 40); setTimeout(drawDualLineWeekly, 40); }
      if (el.dataset.p === 'cost')       { setTimeout(drawDailyCostChart, 40); setTimeout(drawWeeklyCostChart, 40); }
      if (el.dataset.p === 'habits')     setTimeout(buildHabits, 40);

    };

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));

}

// Draws a grouped 5-bar chart onto the given canvas.
// items: array of objects with { label, input, cache_write, cache_read, output, cost }
function drawGroupedTokenChart(canvasId, items) {
  const canvas = $(canvasId);
  if (!canvas || !items.length) return;

  const W = Math.max(canvas.parentElement.clientWidth || 600, items.length * 30);
  const H = 200;
  canvas.width  = W;
  canvas.height = H;
  // Allow horizontal scroll on narrow screens
  canvas.style.minWidth = (items.length * 30) + 'px';
  const ctx = canvas.getContext('2d');

  const pad = { t: 16, r: 52, b: 32, l: 46 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const METRICS = ['input', 'cache_write', 'cache_read', 'output'];
  const maxTokens = Math.max(...items.map(d => METRICS.reduce((s, k) => s + (d[k] || 0), 0)), 1);

  const slotW  = cw / items.length;
  const gap    = Math.max(1, slotW * 0.12);
  const barW   = Math.max(1, (slotW - gap) / 4);

  // Left Y-axis gridlines + labels (tokens)
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  const ticks = 4;
  for (let i = 0; i <= ticks; i++) {
    const y = pad.t + ch - (i / ticks) * ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    const val = (maxTokens * i / ticks);
    ctx.fillStyle = '#666';
    ctx.font = '8px "IBM Plex Mono",monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val >= 1e6 ? (val/1e6).toFixed(1)+'M' : val >= 1e3 ? (val/1e3).toFixed(0)+'K' : val.toFixed(0), pad.l - 3, y + 3);
  }

  // Bars
  items.forEach((d, i) => {
    const slotX = pad.l + i * slotW + gap / 2;

    METRICS.forEach((key, bi) => {
      const h = Math.max(1, ((d[key] || 0) / maxTokens) * ch);
      const x = slotX + bi * barW;
      const y = pad.t + ch - h;
      ctx.fillStyle = TOKEN_COLORS[key];
      ctx.fillRect(x, y, barW - 0.5, h);
    });

    // X-axis label
    ctx.fillStyle = '#555';
    ctx.font = '8px "IBM Plex Mono",monospace';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, slotX + (slotW - gap) / 2, H - 5);
  });
}

// Returns a dense array of the last N calendar days, filling missing days with zeros.
function fillDailyGaps(daily, days) {
  const byDate = {};
  for (const d of daily) byDate[d.date] = d;
  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const dt = new Date();
    dt.setDate(dt.getDate() - i);
    const date = dt.toISOString().slice(0, 10);
    result.push(byDate[date] || { date, input: 0, output: 0, cache_write: 0, cache_read: 0, cost: 0, sessions: 0 });
  }
  return result;
}

function drawDailyChart() {
  const daily = D.dailyUsage || [];
  const shown = fillDailyGaps(daily, 21).map(d => ({ ...d, label: d.date.slice(5) }));
  drawGroupedTokenChart('dailyGroupCanvas', shown);
}

function drawWeeklyTokenChart() {
  const daily = D.dailyUsage || [];
  // Use gap-filled daily data so weeks with no sessions still appear
  const filled = fillDailyGaps(daily, 12 * 7);
  const byWeek = {};
  for (const d of filled) {
    const dt = new Date(d.date + 'T00:00:00');
    const day = (dt.getDay() + 6) % 7;
    const monday = new Date(dt);
    monday.setDate(dt.getDate() - day);
    const key = monday.toISOString().slice(0, 10);
    if (!byWeek[key]) byWeek[key] = { week: key, input: 0, cache_write: 0, cache_read: 0, output: 0, cost: 0 };
    byWeek[key].input       += d.input       || 0;
    byWeek[key].cache_write += d.cache_write || 0;
    byWeek[key].cache_read  += d.cache_read  || 0;
    byWeek[key].output      += d.output      || 0;
    byWeek[key].cost        += d.cost        || 0;
  }
  const weeks = Object.values(byWeek).sort((a, b) => a.week.localeCompare(b.week)).slice(-12)
    .map(w => ({ ...w, label: w.week.slice(5) }));
  drawGroupedTokenChart('weeklyGroupCanvas', weeks);
}

// ─────────────────────────────────────────────────────────────────────────────
const dualLineState = { daily: { cacheHit: true, outputRatio: true }, weekly: { cacheHit: true, outputRatio: true } };

function toggleDualLine(scope, metric) {
  dualLineState[scope][metric] = !dualLineState[scope][metric];
  document.querySelectorAll(`.dl-btn[data-scope="${scope}"][data-metric="${metric}"]`).forEach(btn => {
    btn.classList.toggle('active', dualLineState[scope][metric]);
  });
  if (scope === 'daily') drawDualLineDaily();
  else drawDualLineWeekly();

function drawDualLine(canvasId, items, showCacheHit, showOutputRatio) {
  const canvas = $(canvasId);
  if (!canvas || !items.length) return;
  const W = canvas.parentElement.clientWidth || 580;
  const H = parseInt(canvas.getAttribute('height')) || 120;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const cacheVals = items.map(d => d.cacheHitPct);
  const outVals   = items.map(d => d.outputRatio);
  const allVals   = [...(showCacheHit ? cacheVals : []), ...(showOutputRatio ? outVals : [])];
  if (!allVals.length) { ctx.clearRect(0, 0, W, H); return; }

  const minV = Math.max(0, Math.min(...allVals) * 0.85);
  const maxV = Math.max(Math.max(...allVals) * 1.15, 1);
  const pad = { t: 14, r: 10, b: 24, l: 46 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.strokeStyle = '#252525'; ctx.lineWidth = 1;
  [0, .5, 1].forEach(f => {
    const y = pad.t + ch * (1 - f);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '9px "IBM Plex Mono",monospace';
    ctx.textAlign = 'right';
    ctx.fillText((minV + (maxV - minV) * f).toFixed(0) + '%', pad.l - 4, y + 3);
  });

  if (items.length < 2) return;

  const paintLine = (vals, color) => {
    const toX = i => pad.l + (i / (items.length - 1)) * cw;
    const toY = v => pad.t + ch * (1 - (v - minV) / (maxV - minV));

    ctx.save(); ctx.globalAlpha = 0.09; ctx.fillStyle = color;
    ctx.beginPath();
    vals.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
    ctx.lineTo(pad.l + cw, pad.t + ch); ctx.lineTo(pad.l, pad.t + ch);
    ctx.closePath(); ctx.fill(); ctx.restore();

    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    vals.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
    ctx.stroke();

    vals.forEach((v, i) => {
      ctx.beginPath(); ctx.arc(toX(i), toY(v), 3, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
    });
  };

  if (showCacheHit) paintLine(cacheVals, '#47d4ff');
  if (showOutputRatio) paintLine(outVals, '#c47aff');

  items.forEach((item, i) => {
    if (items.length <= 10 || i % 2 === 0) {
      const x = pad.l + (i / (items.length - 1)) * cw;
      ctx.fillStyle = '#555'; ctx.font = '8px "IBM Plex Mono",monospace';
      ctx.textAlign = 'center';
      ctx.fillText(item.label, x, H - 5);
    }
  });
}

function drawDualLineDaily() {
  const daily = D.dailyUsage || [];
  const items = fillDailyGaps(daily, 21).map(d => {
    const den = (d.input || 0) + (d.cache_write || 0) + (d.cache_read || 0);
    const outDen = (d.input || 0) + (d.output || 0);
    return {
      label: d.date.slice(5),
      cacheHitPct: den > 0 ? Math.round((d.cache_read || 0) / den * 100) : 0,
      outputRatio: outDen > 0 ? Math.round((d.output || 0) / outDen * 100) : 0,
    };
  });
  drawDualLine('dualLineDaily', items, dualLineState.daily.cacheHit, dualLineState.daily.outputRatio);
}

function drawDualLineWeekly() {
  const weeks = D.weeklyTrend;
  if (!weeks || !weeks.length) return;

}

function drawCostBarChart(canvasId, items) {
  const canvas = $(canvasId);
  if (!canvas || !items.length) return;

  const W = Math.max(canvas.parentElement.clientWidth || 600, items.length * 20);
  const H = 200;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.minWidth = (items.length * 20) + 'px';
  const ctx = canvas.getContext('2d');

  const pad = { t: 16, r: 52, b: 32, l: 60 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const maxCost = Math.max(...items.map(d => d.cost || 0), 0.001);

  const ticks = 4;
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let i = 0; i <= ticks; i++) {
    const y = pad.t + ch - (i / ticks) * ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    const val = maxCost * i / ticks;
    ctx.fillStyle = '#666';
    ctx.font = '8px "IBM Plex Mono",monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val >= 1 ? '$' + val.toFixed(2) : val >= 0.01 ? '$' + val.toFixed(3) : '$' + val.toFixed(4), pad.l - 3, y + 3);
  }

  const barW = Math.max(2, cw / items.length * 0.7);
  const slotW = cw / items.length;

  items.forEach((d, i) => {
    const h = Math.max(1, ((d.cost || 0) / maxCost) * ch);
    const x = pad.l + i * slotW + (slotW - barW) / 2;
    const y = pad.t + ch - h;
    ctx.fillStyle = TOKEN_COLORS.cost;
    ctx.fillRect(x, y, barW, h);

    ctx.fillStyle = '#555';
    ctx.font = '8px "IBM Plex Mono",monospace';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x + barW / 2, H - 5);
  });
}

function drawWeeklyCostChart() {

let projectDateFilter = 0;

function buildProjectsFiltered(days) {
  const cutoff = days > 0 ? new Date(Date.now() - days * 864e5) : null;
  const sessions = cutoff
    ? D.sessions.filter(s => s.firstTs && new Date(s.firstTs) >= cutoff)
    : D.sessions;
  const map = {};
  for (const s of sessions) {
    const key = s.project || '(root)';
    if (!map[key]) map[key] = { project: key, cost: 0, sessions: 0, input: 0, output: 0, cache_write: 0, cache_read: 0, models: {} };
    map[key].cost        += s.cost         || 0;
    map[key].sessions    += 1;
    map[key].input       += s.inputTokens  || 0;
    map[key].output      += s.outputTokens || 0;
    map[key].cache_write += s.cacheWrite   || 0;
    map[key].cache_read  += s.cacheRead    || 0;
    const m = s.model || 'unknown';
    map[key].models[m] = (map[key].models[m] || 0) + (s.cost || 0);
  }
  return Object.values(map).sort((a, b) => b.cost - a.cost);
}

function projectCardHtml(p, i) {
  const tot = p.input + p.output + p.cache_write + p.cache_read;
  const hit = tot > 0 ? (p.cache_read / tot * 100).toFixed(0) : 0;
  const out = (p.input + p.output) > 0 ? (p.output / (p.input + p.output) * 100).toFixed(0) : 0;
  const stat = (val, color, label) => `<div>

      <div style="flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
        ${stat(fmtC(p.cost),   'var(--acc2)', 'cost')}
        ${stat(p.sessions,     '',            'sessions')}
        ${stat(fmt(tot),       'var(--acc)',   'total tokens')}
        ${stat(hit+'%',        'var(--acc3)', 'cache hit')}
        ${stat(out+'%',        'var(--acc4)', 'out ratio')}
      </div>

        <div id="ppie-leg-${i}" style="margin-top:5px;font-size:8px;line-height:1.6;font-family:'IBM Plex Mono',monospace;color:var(--mut);text-align:left"></div>
      </div>
    </div>
  </div>`;
}

function drawProjectModelPie(canvasId, legId, models) {
  const canvas = $(canvasId);
  if (!canvas) return;
  const entries = Object.entries(models).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, [, v]) => s + v, 0);
  if (!total) return;

  const ctx = canvas.getContext('2d');
  const W = 72, H = 72;
  canvas.width = W; canvas.height = H;
  const cx = W / 2, cy = H / 2, r = 32, ir = 18;

  let start = -Math.PI / 2;
  for (const [model, cost] of entries) {
    const angle = (cost / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + angle);
    ctx.closePath();
    ctx.fillStyle = modelColor(model);
    ctx.fill();
    start += angle;
  }
  // Donut hole
  ctx.beginPath();
  ctx.arc(cx, cy, ir, 0, Math.PI * 2);
  ctx.fillStyle = '#161616';
  ctx.fill();

  const leg = $(legId);
  if (leg) {
    leg.innerHTML = entries.map(([model, cost]) =>
      `<span style="color:${modelColor(model)}">■</span> ${modelLabel(model)} ${total ? (cost/total*100).toFixed(0) : 0}%<br>`
    ).join('');
  }
}

function renderProjectCards(ps) {
  $('proj-cards').innerHTML = ps.map((p, i) => projectCardHtml(p, i)).join('');
  ps.forEach((p, i) => drawProjectModelPie('ppie-' + i, 'ppie-leg-' + i, p.models));

// ─────────────────────────────────────────────────────────────────────────────
// INSIGHTS (server-computed)
// ─────────────────────────────────────────────────────────────────────────────
let insightWeeks = null;

function computeInsights(sessions) {
  const insights = [];
  if (!sessions.length) return insights;

  const allPrompts = sessions.flatMap(s => (s.queries || []).map(q => ({
    promptLen: (q.userPrompt || '').length,
    inputTokens: q.inputTokens || 0,
    outputTokens: q.outputTokens || 0,
  })));

  const totalTokens      = sessions.reduce((s, x) => s + (x.inputTokens||0)+(x.outputTokens||0)+(x.cacheRead||0)+(x.cacheWrite||0), 0);
  const totalOutputTokens= sessions.reduce((s, x) => s + (x.outputTokens||0), 0);
  const totalCacheRead   = sessions.reduce((s, x) => s + (x.cacheRead||0), 0);
  const totalCost        = sessions.reduce((s, x) => s + (x.cost||0), 0);
  const totalSaved       = totalCacheRead / 1e6 * (3.0 - 0.30);
  const cacheIn          = sessions.reduce((s,x)=>s+(x.inputTokens||0),0);
  const cacheCW          = sessions.reduce((s,x)=>s+(x.cacheWrite||0),0);
  const cacheHitRate     = (cacheIn+cacheCW+totalCacheRead) > 0 ? totalCacheRead/(cacheIn+cacheCW+totalCacheRead) : 0;
  const totals = { totalTokens, totalOutputTokens, totalCacheReadTokens: totalCacheRead, totalCost, totalSaved, cacheHitRate };

  // 1. Vague prompts
  const shortExpensive = allPrompts.filter(p => p.promptLen > 0 && p.promptLen < 30 && (p.inputTokens + p.outputTokens) > 100000);
  if (shortExpensive.length > 0) {
    const totalWasted = shortExpensive.reduce((s, p) => s + p.inputTokens + p.outputTokens, 0);
    insights.push({ type:'warning', title:'Short, vague messages are costing you the most',
      description:`${shortExpensive.length} messages under 30 chars each burned 100K+ tokens. Total: ${fmt(totalWasted)} tokens.`,
      action:'Be specific. Instead of "Yes", say "Yes, update the login page and run the tests."' });
  }

  // 2. Context growth
  const longSessions = sessions.filter(s => (s.queries||[]).length > 50);
  if (longSessions.length > 0) {
    const growthData = longSessions.map(s => {
      const qs = s.queries;
      const first5 = qs.slice(0,5).reduce((sum,q)=>sum+q.inputTokens+q.outputTokens,0)/Math.min(5,qs.length);
      const last5  = qs.slice(-5).reduce((sum,q)=>sum+q.inputTokens+q.outputTokens,0)/Math.min(5,qs.length);
      return { ratio: last5/Math.max(first5,1) };
    }).filter(g => g.ratio > 2);
    if (growthData.length > 0) {
      const avgGrowth = (growthData.reduce((s,g)=>s+g.ratio,0)/growthData.length).toFixed(1);
      insights.push({ type:'warning', title:'The longer you chat, the more each message costs',
        description:`In ${growthData.length} long conversations, messages near the end cost ${avgGrowth}× more than the start.`,
        action:'Start a fresh conversation per task. Paste a short summary if you need prior context.' });
    }
  }

  // 3. Marathon sessions
  const marathonCount = sessions.filter(s => (s.queries||[]).length > 200).length;
  if (marathonCount >= 3) {
    const marathonTokens = sessions.filter(s=>(s.queries||[]).length>200).reduce((s,ses)=>s+(ses.inputTokens||0)+(ses.outputTokens||0),0);
    const pct = ((marathonTokens/Math.max(totalTokens,1))*100).toFixed(0);
    insights.push({ type:'info', title:`Just ${marathonCount} long conversations used ${pct}% of all tokens`,
      description:`${marathonCount} conversations with 200+ turns consumed ${fmt(marathonTokens)} tokens — ${pct}% of everything.`,
      action:'Keep one conversation per task. Start a new one when topics shift.' });
  }

  // 4. Input-heavy
  if (totalTokens > 0) {
    const outputPct = (totalOutputTokens/totalTokens)*100;
    if (outputPct < 2) insights.push({ type:'info', title:`Only ${outputPct.toFixed(1)}% of tokens are Claude actually writing`,
      description:`${(100-outputPct).toFixed(1)}% of all tokens is re-reading history and files. Conversation length is the biggest cost driver.`,
      action:'Shorter conversations have more impact than asking for shorter answers.' });
  }

  // 5. Day-of-week
  if (sessions.length >= 10) {
    const dayMap = {};
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    for (const s of sessions) {
      if (!s.firstTs) continue;
      const d = new Date(s.firstTs).getDay();
      if (!dayMap[d]) dayMap[d] = { tokens:0, sessions:0 };
      dayMap[d].tokens += (s.inputTokens||0)+(s.outputTokens||0);
      dayMap[d].sessions += 1;
    }
    const days = Object.entries(dayMap).map(([d,v])=>({day:dayNames[d],avg:v.tokens/v.sessions}));
    if (days.length >= 3) {
      days.sort((a,b)=>b.avg-a.avg);
      insights.push({ type:'neutral', title:`You use Claude most intensively on ${days[0].day}s`,
        description:`${days[0].day} conversations average ${fmt(Math.round(days[0].avg))} tokens vs ${fmt(Math.round(days[days.length-1].avg))} on ${days[days.length-1].day}s.`,
        action: null });
    }
  }

  // 6. Model mismatch
  const opusSessions = sessions.filter(s => s.model && s.model.toLowerCase().includes('opus'));
  if (opusSessions.length > 0) {
    const simpleOpus = opusSessions.filter(s => (s.queries||[]).length < 10 && (s.inputTokens||0)+(s.outputTokens||0) < 200000);
    if (simpleOpus.length >= 3) {
      const wastedCost = simpleOpus.reduce((s,ses)=>s+(ses.cost||0),0);
      insights.push({ type:'warning', title:`${simpleOpus.length} simple conversations used Opus unnecessarily`,
        description:`These short sessions cost ${fmtC(wastedCost)} on Opus. Opus is 5× more expensive than Sonnet for routine tasks.`,
        action:'Use /model to switch to Sonnet for quick questions.' });
    }
  }

  // 7. Tool-heavy
  if (sessions.length >= 5) {
    const toolHeavy = sessions.filter(s => {
      const qs = s.queries||[];
      const userMsgs = qs.filter(q=>q.userPrompt).length;
      const toolCalls = qs.reduce((sum,q)=>sum+(q.tools||[]).length,0);
      return userMsgs > 0 && toolCalls > userMsgs*3;
    });
    if (toolHeavy.length >= 3) {
      const toolHeavyTokens = toolHeavy.reduce((s,ses)=>s+(ses.inputTokens||0)+(ses.outputTokens||0),0);
      const avgRatio = toolHeavy.reduce((s,ses)=>{
        const qs=ses.queries||[];
        const u=qs.filter(q=>q.userPrompt).length;
        return s+qs.reduce((sum,q)=>sum+(q.tools||[]).length,0)/Math.max(u,1);
      },0)/toolHeavy.length;
      insights.push({ type:'info', title:`${toolHeavy.length} conversations had ~${Math.round(avgRatio)}× more tool calls than messages`,
        description:`These conversations used ${fmt(toolHeavyTokens)} tokens total.`,
        action:'Point Claude to specific files and line numbers to reduce exploratory tool use.' });
    }
  }

  // 8. Project dominance
  if (sessions.length >= 5) {
    const projTokens = {};
    for (const s of sessions) projTokens[s.project] = (projTokens[s.project]||0)+(s.inputTokens||0)+(s.outputTokens||0);
    const sorted = Object.entries(projTokens).sort((a,b)=>b[1]-a[1]);
    if (sorted.length >= 2) {
      const [topProj, topTokens] = sorted[0];
      const pct = ((topTokens/Math.max(totalTokens,1))*100).toFixed(0);
      if (pct >= 60) insights.push({ type:'info', title:`${pct}% of tokens went to one project: ${topProj}`,
        description:`"${topProj}" used ${fmt(topTokens)} of ${fmt(totalTokens)} total tokens.`,
        action:'Break long conversations in this project into focused sub-sessions.' });
    }
  }

  // 9. Conversation efficiency
  if (sessions.length >= 10) {
    const shortSess = sessions.filter(s=>{const l=(s.queries||[]).length;return l>=3&&l<=15;});
    const longSess2 = sessions.filter(s=>(s.queries||[]).length>80);
    if (shortSess.length >= 3 && longSess2.length >= 2) {
      const shortAvg = Math.round(shortSess.reduce((s,ses)=>s+(ses.inputTokens||0)+(ses.outputTokens||0)/(ses.queries||[1]).length,0)/shortSess.length);
      const longAvg  = Math.round(longSess2.reduce((s,ses)=>s+(ses.inputTokens||0)+(ses.outputTokens||0)/(ses.queries||[1]).length,0)/longSess2.length);
      const ratio = (longAvg/Math.max(shortAvg,1)).toFixed(1);
      if (ratio >= 2) insights.push({ type:'warning', title:`Each turn costs ${ratio}× more in long conversations`,
        description:`Short sessions (<15 turns): ~${fmt(shortAvg)} tokens/turn. Long ones (80+ turns): ~${fmt(longAvg)} tokens/turn.`,
        action:'Start fresh conversations more often. This is the single biggest lever for reducing spend.' });
    }
  }

  // 10. Heavy initial context
  if (sessions.length >= 5) {
    const heavyStarts = sessions.filter(s=>(s.queries||[])[0]?.inputTokens>50000);
    if (heavyStarts.length >= 5) {
      const avgStart = Math.round(heavyStarts.reduce((s,ses)=>s+(ses.queries[0].inputTokens||0),0)/heavyStarts.length);
      insights.push({ type:'info', title:`${heavyStarts.length} conversations started with ${fmt(avgStart)}+ tokens of context`,
        description:`Before your first message, Claude reads CLAUDE.md and system context. In ${heavyStarts.length} sessions this averaged ${fmt(avgStart)} tokens.`,
        action:'Keep CLAUDE.md concise. Remove sections you rarely need.' });
    }
  }

  // 11. Cache savings
  if (totals.totalCacheReadTokens > 0) {
    insights.push({ type:'info', title:`Caching saved you an estimated ${fmtC(totals.totalSaved)}`,
      description:`Cache hit rate: ${(totals.cacheHitRate*100).toFixed(1)}%. Without caching your bill would be ~${fmtC(totals.totalCost+totals.totalSaved)}.`,
      action:'Focused, medium-length sessions on a single task maximize cache reuse.' });
  }

  // 12. Smart /clear
  const qualSessions = sessions.filter(s=>(s.queries||[]).length>=10);
  if (qualSessions.length >= 3) {
    const inflections = [];
    for (const s of qualSessions) {
      const qs = s.queries;
      const baseCost = qs.slice(0,5).reduce((sum,q)=>sum+(q.cost||0),0)/Math.min(5,qs.length);
      if (baseCost <= 0) continue;
      for (let i=2;i<qs.length;i++) {
        const wc = ((qs[i].cost||0)+(qs[i-1].cost||0)+(qs[i-2].cost||0))/3;
        if (wc > baseCost*2) { inflections.push(i-1); break; }
      }
    }
    if (inflections.length >= 2) {
      inflections.sort((a,b)=>a-b);
      const med = inflections[Math.floor(inflections.length/2)];
      insights.push({ type:'warning', title:`Use /clear after ~${med} turns to save tokens`,
        description:`Across ${inflections.length} conversations, messages started costing 2× more after turn ${med}.`,
        action:`Try /clear after ~${med} turns. Paste a brief summary before clearing.` });
    }
  }

  return insights;
}

function buildInsights() {
  const el = $('panel-insights');
  const weeks = insightWeeks;
  const filtered = weeks
    ? D.sessions.filter(s => s.firstTs && new Date(s.firstTs) >= new Date(Date.now() - weeks * 7 * 86400000))
    : D.sessions;

  const filterHtml = `
    <div style="display:flex;gap:6px;margin-top:10px">
      ${[1,2,4,8].map(w=>`<button class="rbtn proj-filter-btn${weeks===w?' active':''}" onclick="insightWeeks=${w};buildInsights()">${w}w</button>`).join('')}
      <button class="rbtn proj-filter-btn${weeks===null?' active':''}" onclick="insightWeeks=null;buildInsights()">All</button>
    </div>`;

  if (!filtered.length) {
    el.innerHTML = `
      <div class="pg-hdr">
        <div class="pg-title">Usage Insights</div>
        <div class="pg-sub">Patterns in your usage</div>
        ${filterHtml}
      </div>
      <div style="color:var(--mut);font-size:12px">No sessions in this period.</div>`;
    return;
  }

  const insights = computeInsights(filtered);
  const warnings = insights.filter(i => i.type === 'warning');
  const infos    = insights.filter(i => i.type !== 'warning');

  el.innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Usage Insights</div>
      <div class="pg-sub">${insights.length} patterns detected across ${filtered.length} sessions</div>
      ${filterHtml}
    </div>

    ${warnings.length ? `
    <div class="card-ttl" style="margin-bottom:8px;color:var(--yel)">⚠ Action Required (${warnings.length})</div>
    ${warnings.map(ins => `
      <div class="insight warning">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px">
          <span class="insight-type it-w">warning</span>
          <div class="insight-title" style="flex:1">${ins.title}</div>
        </div>
        <div class="insight-desc">${ins.description}</div>
        ${ins.action ? `<div class="insight-action">→ ${ins.action}</div>` : ''}
      </div>`).join('')}
    <div style="margin-bottom:14px"></div>` : ''}

    ${infos.length ? `
    <div class="card-ttl" style="margin-bottom:8px">ℹ Observations (${infos.length})</div>
    ${infos.map(ins => `
      <div class="insight ${ins.type}">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px">
          <span class="insight-type ${ins.type === 'info' ? 'it-i' : 'it-n'}">${ins.type}</span>
          <div class="insight-title" style="flex:1">${ins.title}</div>
        </div>
        <div class="insight-desc">${ins.description}</div>
        ${ins.action ? `<div class="insight-action">→ ${ins.action}</div>` : ''}
      </div>`).join('')}` : ''}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// HABITS (client-computed heuristics)
// ─────────────────────────────────────────────────────────────────────────────
function buildHabits() {
  const now = new Date();
  const weeks = habitWeeks || 3;
  const cutoff = new Date(now.getTime() - weeks * 7 * 86400000);

  const filteredSessions   = D.sessions.filter(s => s.firstTs && new Date(s.firstTs) >= cutoff);
  const filteredLargeReads = D.largeReads.filter(r => r.timestamp && new Date(r.timestamp) >= cutoff);

  // Daily buckets (for chart x-axis)
  const dayMap = {};
  for (const s of filteredSessions) {
    if (!s.firstTs) continue;
    const key = new Date(s.firstTs).toISOString().slice(0, 10);
    if (!dayMap[key]) dayMap[key] = { week: key, cost: 0, input: 0, cacheRead: 0, cacheWrite: 0, output: 0, count: 0, toolCalls: 0 };
    dayMap[key].cost      += s.cost         || 0;
    dayMap[key].input     += s.inputTokens  || 0;
    dayMap[key].cacheRead += s.cacheRead    || 0;
    dayMap[key].cacheWrite+= s.cacheWrite   || 0;
    dayMap[key].output    += s.outputTokens || 0;
    dayMap[key].count     += 1;
    dayMap[key].toolCalls += s.toolCalls    || 0;
  }
  // Gap-fill every day in the window
  const dayData = [];
  for (let d = new Date(cutoff); d <= now; d.setDate(d.getDate() + 1)) {
    const key = d.toISOString().slice(0, 10);
    dayData.push(dayMap[key] || { week: key, cost: 0, input: 0, cacheRead: 0, cacheWrite: 0, output: 0, count: 0, toolCalls: 0 });
  }
  for (const d of dayData) {
    const den = d.input + d.cacheWrite + d.cacheRead;
    d.cacheHitPct = den > 0 ? Math.round(d.cacheRead / den * 100) : 0;
    d.outputRatio = (d.input + d.output) > 0 ? Math.round(d.output / (d.input + d.output) * 100) : 0;
    d.avgInput    = d.count > 0 ? Math.round(d.input / d.count) : 0;
  }

  // Weekly buckets (for week-count checks only)
  const wkMap = {};
  for (const s of filteredSessions) {
    if (!s.firstTs) continue;
    const dt = new Date(s.firstTs);
    const mon = new Date(dt);
    mon.setDate(dt.getDate() - (dt.getDay() + 6) % 7);
    const key = mon.toISOString().slice(0, 10);
    if (!wkMap[key]) wkMap[key] = { week: key, cost: 0 };
    wkMap[key].cost += s.cost || 0;
  }
  const wkData = Object.values(wkMap).sort((a, b) => a.week.localeCompare(b.week));

  // Aggregate metrics
  const fIn  = filteredSessions.reduce((a, s) => a + (s.inputTokens  || 0), 0);
  const fCW  = filteredSessions.reduce((a, s) => a + (s.cacheWrite   || 0), 0);
  const fCR  = filteredSessions.reduce((a, s) => a + (s.cacheRead    || 0), 0);
  const fOut = filteredSessions.reduce((a, s) => a + (s.outputTokens || 0), 0);
  const avgIn    = filteredSessions.length > 0 ? fIn / filteredSessions.length : 0;
  const cacheHit = (fIn + fCW + fCR) > 0 ? fCR / (fIn + fCW + fCR) : 0;
  const outRatio = (fIn + fOut) > 0 ? fOut / (fIn + fOut) : 0;
  const errReads = filteredLargeReads.filter(r => r.error).length;
  const scaleFactor = D.sessions.length ? filteredSessions.length / D.sessions.length : 1;
  const totalReads = Math.round(((D.toolCounts['Read'] || 0) + (D.toolCounts['View'] || 0)) * scaleFactor);
  const bash       = Math.round((D.toolCounts['Bash'] || 0) * scaleFactor);

  // Compute 3-period trend message from daily data
  function trendMsg(accessor, lowerIsBetter, labelFmt, aggFn) {
    const pts = dayData.filter(d => accessor(d) !== 0 || d.count > 0);
    if (pts.length < 3) return null;
    const t = Math.floor(pts.length / 3);
    const agg = aggFn === 'avg'
      ? arr => arr.length ? arr.reduce((s, d) => s + accessor(d), 0) / arr.length : 0
      : arr => arr.reduce((s, d) => s + accessor(d), 0);
    const v1 = agg(pts.slice(0, t));
    const v2 = agg(pts.slice(t, 2 * t));
    const v3 = agg(pts.slice(2 * t));
    const threshold = 0.05;
    let status;
    if (lowerIsBetter) {
      status = v3 < v1 * (1 - threshold) ? 'Improving ✓' : v3 > v1 * (1 + threshold) ? 'Getting worse ↑' : 'No clear trend →';
    } else {
      status = v3 > v1 * (1 + threshold) ? 'Improving ✓' : v3 < v1 * (1 - threshold) ? 'Getting worse ↓' : 'No clear trend →';
    }
    const label = `Last ${weeks} week${weeks > 1 ? 's' : ''}`;
    return `${label}: ${labelFmt(v1)} → ${labelFmt(v2)} → ${labelFmt(v3)}. ${status}`;
  }

  const filterHtml = `
    <div style="display:flex;gap:6px;margin-top:10px">
      ${[1,2,3,4].map(w=>`<button class="rbtn proj-filter-btn${weeks===w?' active':''}" onclick="habitWeeks=${w};buildHabits()">${w}w</button>`).join('')}
    </div>`;

  if (!filteredSessions.length) {
    $('panel-habits').innerHTML = `
      <div class="pg-hdr">
        <div class="pg-title">Bad Habits Detected</div>
        <div class="pg-sub">Patterns in your usage that inflate cost</div>
        ${filterHtml}
      </div>
      <div class="habit info">
        <div><div class="htt">No Data in This Period</div>
             <div class="hds">No sessions found in the selected date range. Try a wider window.</div></div>
        <div class="hbdg bdr-b">no data</div>
      </div>`;
    return;
  }

  const habits = [];

  if (wkData.length >= 3) {
    const r = wkData.slice(-3).map(w => w.cost);
    if (r[2] > r[1] && r[1] > r[0])
      habits.push({ sev:'crit', t:'Cost Trending Up',
        trend: trendMsg(d => d.cost, true, fmtC, 'sum'),
        b:'↑ rising', bc:'bdr-r', color:'#ff6b6b', labelFmt:fmtC,
        accessor:d=>d.cost,
        tip:'Use /clear more often and break long work into shorter, focused sessions.' });
    else if (r[2] < r[1] && r[1] < r[0])
      habits.push({ sev:'info', t:'Cost Trending Down ✓',
        trend: trendMsg(d => d.cost, true, fmtC, 'sum'),
        b:'↓ falling', bc:'bdr-g', color:'#47ff8a', labelFmt:fmtC,
        accessor:d=>d.cost,
        tip:'Keep it up — stay focused and reset context between unrelated tasks.' });
  }

  if (avgIn > 20000)
    habits.push({ sev:'crit', t:'Very Large Context Windows',
      trend: trendMsg(d => d.avgInput, true, v=>fmt(v), 'avg'),
      b:`${fmt(avgIn)} avg input`, bc:'bdr-r', color:'#ff6b6b', labelFmt:v=>fmt(v),
      accessor:d=>d.avgInput,
      tip:'Run /clear between major tasks; aim to keep input under 20k tokens per turn.' });
  else if (avgIn > 8000)
    habits.push({ sev:'warn', t:'Growing Context Windows',
      trend: trendMsg(d => d.avgInput, true, v=>fmt(v), 'avg'),
      b:`${fmt(avgIn)} avg input`, bc:'bdr-y', color:'#e8ff47', labelFmt:v=>fmt(v),
      accessor:d=>d.avgInput,
      tip:'Break long sessions into focused sub-sessions and use /clear to reset.' });

  if (totalReads > 20)
    habits.push({ sev:'crit', t:'Excessive File Reading',
      trend: trendMsg(d => d.toolCalls, true, v=>String(Math.round(v)), 'sum'),
      b:`${totalReads} reads`, bc:'bdr-r', color:'#ff6b6b', labelFmt:v=>String(Math.round(v)),
      accessor:d=>d.toolCalls,
      tip:'Use offset+limit when reading files and grep before opening large files.' });
  else if (totalReads > 5)
    habits.push({ sev:'warn', t:'Frequent File Reading',
      trend: trendMsg(d => d.toolCalls, true, v=>String(Math.round(v)), 'sum'),
      b:`${totalReads} reads`, bc:'bdr-y', color:'#e8ff47', labelFmt:v=>String(Math.round(v)),
      accessor:d=>d.toolCalls,
      tip:'Audit for duplicate reads in the same session and use grep for targeted lookups.' });

  if (errReads > 0)
    habits.push({ sev:'crit', t:'Files Hit Token Limit',
      trend: null,
      b:`${errReads} failed reads`, bc:'bdr-r', color:'#ff6b6b', labelFmt:v=>String(Math.round(v)),
      accessor:d=>d.toolCalls,
      tip:'Add explicit offset+limit args to every Read call on large files.' });

  if (cacheHit >= 0.5)
    habits.push({ sev:'info', t:'Good Cache Utilization ✓',
      trend: trendMsg(d => d.cacheHitPct, false, v=>v+'%', 'avg'),
      b:`${(cacheHit*100).toFixed(0)}% cache hit`, bc:'bdr-g', color:'#47d4ff', labelFmt:v=>v+'%',
      accessor:d=>d.cacheHitPct,
      tip:'Maintain focused sessions and keep your CLAUDE.md stable to preserve cache.' });
  else
    habits.push({ sev:'warn', t:'Low Cache Hit Rate',
      trend: trendMsg(d => d.cacheHitPct, false, v=>v+'%', 'avg'),
      b:`${(cacheHit*100).toFixed(0)}% cache hit`, bc:'bdr-y', color:'#e8ff47', labelFmt:v=>v+'%',
      accessor:d=>d.cacheHitPct,
      tip:'Keep CLAUDE.md stable and work on one topic per session to boost cache hits.' });

  if (outRatio > 0.25)
    habits.push({ sev:'warn', t:'High Output Token Ratio',
      trend: trendMsg(d => d.outputRatio, true, v=>v+'%', 'avg'),
      b:`${(outRatio*100).toFixed(0)}% output`, bc:'bdr-y', color:'#c47aff', labelFmt:v=>v+'%',
      accessor:d=>d.outputRatio,
      tip:"Add 'be concise' to CLAUDE.md and prefer numbered lists over verbose prose." });

  if (bash > 30)
    habits.push({ sev:'warn', t:'High Bash Tool Usage',
      trend: trendMsg(d => d.toolCalls, true, v=>String(Math.round(v)), 'sum'),
      b:`${bash} bash calls`, bc:'bdr-y', color:'#e8ff47', labelFmt:v=>String(Math.round(v)),
      accessor:d=>d.toolCalls,
      tip:'Chain commands with && in a single Bash call to reduce round-trips.' });

  if (!habits.length)
    habits.push({ sev:'info', t:'No Major Issues Found',
      trend: null,
      b:'all clear', bc:'bdr-b', color:'#47ff8a', labelFmt:v=>String(v),
      accessor:d=>0,
      tip:'Continue loading more sessions for a more accurate picture.' });

  habits.forEach((h, i) => { h.chartId = 'hchart-' + i; });

  $('panel-habits').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Bad Habits Detected</div>
      <div class="pg-sub">Patterns in your usage that inflate cost</div>
      ${filterHtml}
    </div>
    ${habits.map(h => {
      const hasChart = dayData.filter(d => h.accessor(d) > 0).length >= 2;
      return `
      <div class="habit ${h.sev}">
        <div>
          <div class="htt">${h.t}</div>
          ${h.trend ? `<div class="hds">${h.trend}</div>` : ''}
          ${hasChart
            ? `<canvas id="${h.chartId}" class="habit-chart" height="50"></canvas>`
            : `<div class="habit-chart-empty">Not enough data for trend</div>`}
          <div class="hexp">${h.tip}</div>
        </div>
        <div class="hbdg ${h.bc}">${h.b}</div>
      </div>`;
    }).join('')}
  `;

  habits.forEach(h => {
    const hasChart = dayData.filter(d => h.accessor(d) > 0).length >= 2;
    if (hasChart) drawLine(h.chartId, dayData, h.accessor, h.color, h.labelFmt);
  });
}

function buildTools() {
  const weeks = toolWeeks;
  const cutoff = weeks ? new Date(Date.now() - weeks * 7 * 86400000) : null;
  const filteredSessions = cutoff
    ? D.sessions.filter(s => s.firstTs && new Date(s.firstTs) >= cutoff)
    : D.sessions;
  const scaleFactor = D.sessions.length ? filteredSessions.length / D.sessions.length : 1;

  const tcRaw = D.toolCounts;
  const tc = Object.fromEntries(Object.entries(tcRaw).map(([k,v]) => [k, Math.round(v * scaleFactor)]));
  const sorted = Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  const total = sorted.reduce((a,[,v])=>a+v, 0);
  const maxCt = sorted[0]?.[1] || 1;

  const filteredLargeReads = cutoff
    ? D.largeReads.filter(r => r.timestamp && new Date(r.timestamp) >= cutoff)
    : D.largeReads;

  const filterHtml = `
    <div style="display:flex;gap:6px;margin-top:10px">
      ${[1,2,3,4,8].map(w=>`<button class="rbtn proj-filter-btn${weeks===w?' active':''}" onclick="toolWeeks=${w};buildTools()">${w}w</button>`).join('')}
      <button class="rbtn proj-filter-btn${weeks===null?' active':''}" onclick="toolWeeks=null;buildTools()">All</button>
    </div>`;

  $('panel-tools').innerHTML = `
    <div class="pg-hdr">
      <div class="pg-title">Tool Usage</div>
      <div class="pg-sub">Every tool result adds tokens to context</div>
      ${filterHtml}
    </div>
    <div class="kpi-row c3">
      <div class="kpi kb"><div class="kpi-lbl">Total Calls</div><div class="kpi-val">${total}</div><div class="kpi-sub">across all sessions</div></div>
      <div class="kpi ky"><div class="kpi-lbl">Most Used</div><div class="kpi-val" style="font-size:13px">${sorted[0]?.[0]||'—'}</div><div class="kpi-sub">${sorted[0]?.[1]||0} calls</div></div>
      <div class="kpi kr"><div class="kpi-lbl">Large Reads</div><div class="kpi-val">${filteredLargeReads.length}</div><div class="kpi-sub">50+ line reads</div></div>
    </div>
    <div class="card">
      <div class="card-ttl">All tools</div>
      <div class="tool-row" style="padding-bottom:3px">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut2)">Tool</div>
        <div></div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;text-align:right;color:var(--mut2)">Calls</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;text-align:right;color:var(--mut2)">%</div>
      </div>
      ${sorted.map(([name,ct])=>`
        <div class="tool-row">
          <div class="tnm">${name}</div>
          <div class="btrk" style="height:5px"><div class="bfil" style="width:${(ct/maxCt*100).toFixed(0)}%;background:var(--acc3)"></div></div>
          <div class="tct">${ct}</div>
          <div class="tpc">${(ct/total*100).toFixed(1)}%</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-ttl">Large file reads</div>
      ${filteredLargeReads.length === 0
        ? '<div style="color:var(--mut);font-size:11px">None detected — good!</div>'
        : `<table class="tbl"><thead><tr><th>File</th><th>Lines</th><th>Total</th><th>Status</th></tr></thead><tbody>
          ${filteredLargeReads.slice(0,15).map(r=>`<tr>
            <td style="max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.file.split('/').slice(-3).join('/')}</td>
            <td class="${r.error?'tc':''}">${r.lines}</td>
            <td>${r.totalLines||'?'}</td>
            <td>${r.error?'<span style="color:var(--red)">LIMIT EXCEEDED</span>':'<span style="color:var(--yel)">Large</span>'}</td>
          </tr>`).join('')}
          </tbody></table>`}
    </div>
  `;
}

function renderTopPromptsTable() {
  const allPrompts = D.topPrompts || [];
  const start = topPromptDateStart ? new Date(topPromptDateStart + 'T00:00:00') : null;
  const end   = topPromptDateEnd   ? new Date(topPromptDateEnd   + 'T23:59:59') : null;

  let filtered = allPrompts;
  if (start && end && start > end) {
    filtered = [];
  } else {
    if (start) filtered = filtered.filter(p => p.date && new Date(p.date) >= start);
    if (end)   filtered = filtered.filter(p => p.date && new Date(p.date) <= end);
  }
  const prompts = filtered.slice(0, 20);

  const clearBtn = $('tp-clear-btn');
  if (clearBtn) clearBtn.style.display = (topPromptDateStart || topPromptDateEnd) ? '' : 'none';

  const card = $('tp-card');
  if (!card) return;

  if (!prompts.length) {
    card.innerHTML = `<div style="color:var(--mut);font-size:11px;padding:8px 0">No prompt data in this period.</div>`;
    return;
  }

  const maxCost = prompts[0]?.cost || 0.001;
  card.innerHTML = `
    <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);margin-bottom:10px">${filtered.length} prompts in period</div>
    ${prompts.map((p, i) => {
      const total = p.inputTokens + p.outputTokens + p.cacheWrite + p.cacheRead;
      return `
      <div class="prompt-row">
        <div class="prompt-rank">#${i+1} · ${p.date||'?'} · ${p.project} · <span style="color:${modelColor(p.model)}">${modelLabel(p.model)}</span></div>
        <div class="prompt-text">${escHtml(p.prompt)}</div>
        <div class="prompt-bars">
          <div class="prompt-lbl">Input</div>
          <div class="btrk" style="height:4px"><div class="bfil" style="width:${(p.inputTokens/Math.max(total,1)*100).toFixed(0)}%;background:var(--acc)"></div></div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);text-align:right">${fmt(p.inputTokens)}</div>
        </div>
        <div class="prompt-bars">
          <div class="prompt-lbl">Output</div>
          <div class="btrk" style="height:4px"><div class="bfil" style="width:${(p.outputTokens/Math.max(total,1)*100).toFixed(0)}%;background:var(--acc4)"></div></div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);text-align:right">${fmt(p.outputTokens)}</div>

function escHtml(s) {
  if (!s) return '(no prompt text)';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

  $('panel-sessions').innerHTML = `

function renderSessionsTable(sessions) {
  const tbody = $('sess-tbody');
  const summary = $('sess-summary');
  if (!sessions.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--mut);padding:24px 9px;font-style:italic">No sessions match the current filters</td></tr>`;

  }
  if (summary) {
    const totalCost = sessions.reduce((s, x) => s + (x.cost || 0), 0);
    summary.innerHTML = `${sessions.length} session${sessions.length !== 1 ? 's' : ''} &nbsp;·&nbsp; <span style="color:var(--acc2)">${fmtC(totalCost)}</span> total`;
  }
  tbody.innerHTML = sessions.map(s => {

    return `<tr class="clickable" onclick="showDrilldown(${origIdx})">

function applySessionFilters() {
  const startVal = ($('sess-date-start') || {}).value || '';
  const endVal   = ($('sess-date-end')   || {}).value || '';
  const checked  = [...document.querySelectorAll('.proj-check:checked')].map(cb => cb.value);

  let filtered = D.sessions;

  if (startVal && endVal && startVal > endVal) {
    filtered = [];
  } else {
    if (startVal) {
      const start = new Date(startVal + 'T00:00:00');
      filtered = filtered.filter(s => s.firstTs && new Date(s.firstTs) >= start);
    }
    if (endVal) {
      const end = new Date(endVal + 'T23:59:59');
      filtered = filtered.filter(s => s.firstTs && new Date(s.firstTs) <= end);
    }
  }

  if (checked.length > 0) {
    filtered = filtered.filter(s => checked.includes(s.project || '(root)'));
  }

  const clearBtn = $('sess-clear-btn');
  if (clearBtn) clearBtn.style.display = (startVal || endVal || checked.length) ? '' : 'none';

  renderSessionsTable(filtered);
}

function toggleProjDropdown(e) {

function clearSessionFilters() {
  $('sess-date-start').value = '';
  $('sess-date-end').value = '';
  document.querySelectorAll('.proj-check').forEach(cb => cb.checked = false);
  $('sess-clear-btn').style.display = 'none';

function drawLine(id, weeks, acc, color, labelFmt) {
  const canvas = $(id);
  if (!canvas) return;
  const W = canvas.parentElement.clientWidth || 580;
  const H = parseInt(canvas.getAttribute('height')) || 110;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const vals = weeks.map(acc);
  const min  = Math.min(...vals) * 0.85;
  const maxV = Math.max(...vals) * 1.15 || 1;
  const pad  = {t:14, r:10, b:24, l:46};
  const cw   = W - pad.l - pad.r;
  const ch   = H - pad.t - pad.b;

  ctx.strokeStyle = '#252525'; ctx.lineWidth = 1;
  [0, .5, 1].forEach(f => {
    const y = pad.t + ch*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    ctx.fillStyle='#555'; ctx.font='9px "IBM Plex Mono",monospace';
    ctx.textAlign='right';
    ctx.fillText(labelFmt(min+(maxV-min)*f), pad.l-4, y+3);
  });

  if (weeks.length < 2) return;

  ctx.save(); ctx.globalAlpha=0.09; ctx.fillStyle=color;
  ctx.beginPath();
  weeks.forEach((w,i) => {
    const x = pad.l + (i/(weeks.length-1))*cw;
    const y = pad.t + ch*(1-(vals[i]-min)/(maxV-min));
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+cw, pad.t+ch);
  ctx.lineTo(pad.l, pad.t+ch);
  ctx.closePath(); ctx.fill(); ctx.restore();

  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round';
  ctx.beginPath();
  weeks.forEach((w,i) => {
    const x = pad.l + (i/(weeks.length-1))*cw;
    const y = pad.t + ch*(1-(vals[i]-min)/(maxV-min));
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  weeks.forEach((w,i) => {
    const x = pad.l + (i/(weeks.length-1))*cw;
    const y = pad.t + ch*(1-(vals[i]-min)/(maxV-min));
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    if (weeks.length <= 10 || i%2===0) {
      ctx.fillStyle='#555'; ctx.font='8px "IBM Plex Mono",monospace';
      ctx.textAlign='center';
      ctx.fillText(w.week.slice(5), x, H-5);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.onclick = () => {
    if (!D) return;
    activePanel = el.dataset.p;
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('on'));
    el.classList.add('on');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    const pnl = $('panel-'+el.dataset.p);
    if (pnl) pnl.classList.add('on');
    if (el.dataset.p === 'daily') { setTimeout(drawDailyChart, 40); setTimeout(drawWeeklyTokenChart, 40); setTimeout(drawDualLineDaily, 40); setTimeout(drawDualLineWeekly, 40); }
    if (el.dataset.p === 'cost')  { setTimeout(drawDailyCostChart, 40); setTimeout(drawWeeklyCostChart, 40); }
  };
});

loadData();
</script>
